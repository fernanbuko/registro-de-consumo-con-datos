<style>
  :root{
    --bg:#0f1720; --card:#182230; --card2:#1f2b3a; --accent:#4f8ff0; --accent2:#7bd88f;
    --text:#e8edf3; --sub:#93a3b8; --danger:#f0716f; --ok:#5fd39a; --border:#2a3849; --blue:#7cb0ff;
  }
  body.light{
    --bg:#f4f6f9; --card:#ffffff; --card2:#eef1f6; --accent:#2f6fe0; --accent2:#2f9e63;
    --text:#1a2430; --sub:#5a6b80; --danger:#d5473f; --ok:#2f9e63; --border:#d7dee6; --blue:#2f6fe0;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Segoe UI', Arial, sans-serif; background:var(--bg); color:var(--text); padding:14px 14px 40px;}
  .wrap{max-width:820px; margin:0 auto;}
  h1{font-size:1.25rem; margin:0 0 2px 0;}
  .sub{color:var(--sub); font-size:.8rem; margin-bottom:14px;}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:14px; -webkit-overflow-scrolling:touch;}
  .tabs button{
    flex:0 0 auto; padding:8px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--card2); color:var(--sub); font-size:.82rem; cursor:pointer; white-space:nowrap;
  }
  .tabs button.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .tabs button.addyear{background:transparent; border:1px dashed var(--accent2); color:var(--accent2);}
  .tabs button.delbtn{padding:4px 8px; border-radius:50%; background:var(--card2); color:var(--danger); font-size:.7rem; border:1px solid var(--border);}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px;}
  .card h2{font-size:1rem; margin:0 0 10px 0; color:var(--blue);}
  .card h3{font-size:.85rem; margin:14px 0 8px 0; color:var(--sub); text-transform:uppercase; letter-spacing:.03em;}
  table{width:100%; border-collapse:collapse; font-size:.82rem;}
  th, td{text-align:left; padding:6px 5px; border-bottom:1px solid var(--border);}
  th{color:var(--sub); font-weight:600; font-size:.72rem;}
  input[type=number], input[type=time], input[type=date]{
    width:100px; padding:6px 8px; border-radius:6px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:.85rem;
  }
  input[type=date]{width:140px;}
  input[type=time]::-webkit-calendar-picker-indicator,
  input[type=date]::-webkit-calendar-picker-indicator{
    filter:invert(.8);
  }
  input.hasvalue{border-color:var(--blue); color:var(--blue);}
  select{
    width:100%; padding:8px 10px; border-radius:6px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:.9rem; cursor:pointer;
  }
  select option{background:var(--card2); color:var(--text);}
  button{
    font-family:inherit; background:var(--accent); color:#fff; border:1px solid var(--accent);
    border-radius:8px; padding:8px 14px; cursor:pointer; font-size:.85rem;
  }
  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0;}
  .stat{background:var(--card2); border-radius:10px; padding:10px; text-align:center;}
  .stat .num{font-size:1.15rem; font-weight:700;}
  .stat .lbl{font-size:.68rem; color:var(--sub); margin-top:2px;}
  .estado{padding:9px 12px; border-radius:8px; font-weight:600; text-align:center; font-size:.85rem; margin-top:8px;}
  .estado.ok{background:rgba(95,211,154,.15); color:var(--ok);}
  .estado.pend{background:rgba(240,113,111,.12); color:#e8b169;}
  .kv{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed var(--border); font-size:.85rem;}
  .kv .v{font-weight:600;}
  .kv .v.blue{color:var(--blue);}
  .kv .v.green{color:var(--accent2);}
  .totalrow{border-top:2px solid var(--border); margin-top:6px; padding-top:8px; font-weight:700;}
  .badge{display:inline-block; font-size:.68rem; padding:2px 8px; border-radius:20px; background:var(--card2); color:var(--sub);}
  .note{font-size:.72rem; color:var(--sub); margin-top:6px; line-height:1.4;}
  canvas{max-height:200px;}
  .daysbox{border:1px solid var(--border); border-radius:8px; padding:4px 8px;}
  .cols2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:600px){ .cols2{grid-template-columns:1fr;} }
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:8px;}
  .calhead{font-size:.65rem; color:var(--sub); text-align:center; padding-bottom:2px;}
  .calcell{border-radius:6px; padding:6px 2px; text-align:center; font-size:.68rem; min-height:44px; display:flex; flex-direction:column; justify-content:center; border:1px solid var(--border);}
  .calcell .d{font-weight:700; font-size:.78rem;}
  .calcell .k{font-size:.62rem; margin-top:2px; opacity:.85;}
  .calcell.empty{border:none;}

  /* --- Ajustes para celular --- */
  @media (max-width:480px){
    body{padding:10px 10px 32px; font-size:.95rem;}
    h1{font-size:1.08rem;}
    .sub{font-size:.72rem;}
    .card{padding:12px; border-radius:12px; margin-bottom:10px;}
    .card h2{font-size:.92rem;}
    .tabs{gap:5px; margin-bottom:10px;}
    .tabs button{padding:9px 12px; font-size:.78rem; min-height:38px;}
    table{font-size:.74rem;}
    th, td{padding:7px 3px;}
    .summary-grid{gap:8px;}
    .stat{padding:8px 6px;}
    .stat .num{font-size:1.02rem;}
    .stat .lbl{font-size:.6rem;}
    .calcell{min-height:36px; font-size:.6rem;}
    .calcell .d{font-size:.7rem;}
    button{min-height:38px;}
    /* la tabla de lecturas diarias es la más ancha de toda la app: en celular
       se quita la columna "Día" (ya la puedes ver si lo necesitas en el calendario)
       y se achican los campos, para que quepan las 5 columnas con el mínimo de
       scroll lateral posible. */
    .daysbox input[type=number]{width:66px; padding:5px 3px; font-size:16px;}
    .daysbox input[type=time]{width:76px; padding:5px 2px; font-size:.72rem;}
    .daysbox th, .daysbox td{padding:6px 2px; font-size:.7rem;}
    .foto-btn{padding:3px 6px !important; font-size:.85rem !important;}
    /* En celular, las filas "etiqueta: valor" (Nombre, Dirección, etc.) se acomodan
       una debajo de otra en vez de lado a lado, para que valores largos (como una
       dirección) no queden pegados a su etiqueta. */
    .kv{flex-direction:column; align-items:flex-start; gap:2px;}
    .kv .v{text-align:left;}
  }
  /* Los campos de fecha/hora/número deben medir al menos 16px de letra en celular,
     si no, Safari/Chrome en iOS hacen zoom automático al tocar el campo. */
  input[type=number], input[type=time], input[type=date], select{
    font-size:max(16px, .85rem);
  }

  /* --- Pantalla de bienvenida --- */
  #landingScreen{
    background:
      radial-gradient(circle at 50% 0%, rgba(79,143,240,.14), transparent 55%),
      var(--bg);
  }
  .landing-card{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:32px 28px; box-shadow:0 20px 50px -20px rgba(0,0,0,.6);
  }
  .landing-bolt{
    width:64px; height:64px; margin:0 auto 14px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:1.8rem;
    background:radial-gradient(circle, rgba(79,143,240,.25), rgba(79,143,240,.05));
    border:1px solid var(--border);
  }
  .landing-title{font-size:1.35rem; font-weight:700; margin:0 0 4px;}
  .landing-sub{color:var(--sub); font-size:.85rem; margin-bottom:26px; line-height:1.5;}
  .landing-section-label{
    font-size:.68rem; color:var(--sub); text-transform:uppercase; letter-spacing:.06em;
    font-weight:700; margin:0 0 8px; text-align:left;
  }
  .profile-card{
    display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px;
    border:1px solid var(--border); background:var(--card2); cursor:pointer;
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
    text-align:left;
  }
  .profile-card:hover{border-color:var(--accent); transform:translateY(-1px); background:#233247;}
  .profile-card.active-profile{border-color:var(--accent);}
  .profile-card .avatar{
    width:38px; height:38px; border-radius:50%; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; font-size:1.1rem;
    background:var(--card); border:1px solid var(--border);
  }
  .profile-card .info{flex:1; min-width:0;}
  .profile-card .info .name{font-weight:700; font-size:.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .profile-card .info .meta{font-size:.72rem; color:var(--sub); margin-top:2px;}
  .profile-card .chev{color:var(--sub); font-size:1rem; flex:0 0 auto;}
  .profile-card-new{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 16px; border-radius:12px; border:1px dashed var(--accent2); color:var(--accent2);
    cursor:pointer; font-weight:700; font-size:.85rem;
    transition:background .15s ease;
  }
  .profile-card-new:hover{background:rgba(52,211,153,.08);}
</style>
</head>
<body>
<div id="loadingScreen" style="display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px;">
  <div style="text-align:center;">
    <div class="landing-bolt">⚡</div>
    <div style="width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; margin:14px auto 0; animation:girar 0.8s linear infinite;"></div>
  </div>
</div>
<style>@keyframes girar{ to{ transform:rotate(360deg); } }</style>
<div id="authScreen" style="display:none; min-height:100vh; align-items:center; justify-content:center; padding:20px;">
  <div style="max-width:380px; width:100%;" class="landing-card">
    <div style="text-align:center;">
      <div class="landing-bolt">⚡</div>
      <h1 class="landing-title" id="authTitle">Iniciar sesión</h1>
      <div class="landing-sub" id="authSub">Inicia sesión para ver tus datos desde cualquier dispositivo.</div>
    </div>
    <button id="authGoogleBtn" style="width:100%; margin-top:16px; padding:10px 14px; background:#fff; color:#1f1f1f; border:1px solid #dadce0; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:600;">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.81.54-1.85.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      <span id="authGoogleBtnLabel">Continuar con Google</span>
    </button>
    <div style="display:flex; align-items:center; gap:10px; margin:16px 0; color:var(--sub); font-size:.78rem;">
      <div style="flex:1; height:1px; background:var(--border);"></div>
      <span>o con tu correo</span>
      <div style="flex:1; height:1px; background:var(--border);"></div>
    </div>
    <label style="font-size:.78rem; color:var(--sub); display:block; margin:14px 0 4px;">Correo</label>
    <input type="email" id="authEmail" placeholder="tucorreo@ejemplo.com" style="width:100%;" autocomplete="email">
    <label style="font-size:.78rem; color:var(--sub); display:block; margin:10px 0 4px;">Contraseña</label>
    <div style="position:relative;">
      <input type="password" id="authPassword" placeholder="Mínimo 6 caracteres" style="width:100%; padding-right:44px;" autocomplete="current-password">
      <button type="button" id="authVerPasswordBtn" title="Mostrar/ocultar contraseña" style="position:absolute; right:0; top:0; bottom:0; width:42px; background:none; border:none; color:#6b7280; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div id="authConfirmWrap" style="display:none;">
      <label style="font-size:.78rem; color:var(--sub); display:block; margin:10px 0 4px;">Confirmar contraseña</label>
      <div style="position:relative;">
        <input type="password" id="authPasswordConfirm" placeholder="Escribe la misma contraseña" style="width:100%; padding-right:44px;" autocomplete="new-password">
        <button type="button" id="authVerPasswordConfirmBtn" title="Mostrar/ocultar contraseña" style="position:absolute; right:0; top:0; bottom:0; width:42px; background:none; border:none; color:#6b7280; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div class="note" id="authError" style="color:var(--danger); display:none; margin-top:8px;"></div>
    <button id="authSubmitBtn" style="width:100%; margin-top:14px; padding:10px 14px;">Iniciar sesión</button>
    <button id="authToggleBtn" style="width:100%; margin-top:8px; padding:9px 14px; background:var(--card2); color:var(--text); border:1px solid var(--border);">¿No tienes cuenta? Crear una</button>
    <button id="authOlvideBtn" style="width:100%; margin-top:8px; padding:8px 14px; background:none; color:var(--sub); border:none; text-decoration:underline; font-size:.82rem;">¿Olvidaste tu contraseña?</button>
    <button id="authSinCuentaBtn" style="width:100%; margin-top:16px; padding:9px 14px; background:none; color:var(--sub); border:1px dashed var(--border);">Usar sin cuenta (solo en este dispositivo)</button>
    <button id="authInvitadoBtn" style="width:100%; margin-top:8px; padding:9px 14px; background:none; color:var(--accent); border:1px dashed var(--accent);">👀 Ver una demo (modo invitado)</button>
  </div>
</div>

<script>
// Capa de almacenamiento: usa window.storage (Claude.ai) cuando está disponible,
// y si no (por ejemplo al abrir el .html descargado directo en el navegador),
// guarda en localStorage del propio navegador para que los datos no se borren.
const HAS_CLAUDE_STORAGE = (typeof window !== 'undefined' && !!window.storage);
let FIREBASE_UID = null;      // se llena al iniciar sesión
let FIREBASE_DATOS = {};      // copia en memoria de los datos guardados en la nube de este usuario
let MODO_INVITADO = false;    // true mientras se explora la demo — nada de esto se guarda de verdad
let INVITADO_DATOS = {};      // almacén en memoria, solo para la sesión de demo
let avisoErrorFirebaseMostrado = false;
function avisarErrorFirebase(e){
  if(avisoErrorFirebaseMostrado) return; // solo una vez por sesión, para no saturar de alertas
  avisoErrorFirebaseMostrado = true;
  const esPermiso = e && (e.code === 'permission-denied' || (e.message && e.message.toLowerCase().includes('permission')));
  const msg = esPermiso
    ? 'No se pudo guardar en la nube: permiso denegado. Es probable que las reglas de seguridad de Firestore no estén publicadas correctamente — revísalas en la consola de Firebase (Firestore Database → Rules).'
    : 'No se pudo guardar en la nube. Revisa tu conexión a internet e intenta de nuevo.';
  try{ alert(msg); }catch(err){}
}

async function storageGet(key){
  if(MODO_INVITADO){
    return (INVITADO_DATOS[key] !== undefined) ? INVITADO_DATOS[key] : null;
  }
  if(FIREBASE_UID){
    return (FIREBASE_DATOS && FIREBASE_DATOS[key] !== undefined) ? FIREBASE_DATOS[key] : null;
  }
  if(HAS_CLAUDE_STORAGE){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
    catch(e){ return null; }
  }
  return localStorage.getItem(key);
}
async function storageSet(key, value){
  if(MODO_INVITADO){
    INVITADO_DATOS[key] = value;
    return;
  }
  if(FIREBASE_UID){
    FIREBASE_DATOS[key] = value;
    try{
      await firebase.firestore().collection('usuarios').doc(FIREBASE_UID).set({datos:{[key]:value}}, {merge:true});
    }catch(e){ console.error('Error guardando en la nube:', e); avisarErrorFirebase(e); }
    return;
  }
  if(HAS_CLAUDE_STORAGE){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error(e); }
  } else {
    try{ localStorage.setItem(key, value); }catch(e){ console.error(e); }
  }
}
async function storageDelete(key){
  if(MODO_INVITADO){
    delete INVITADO_DATOS[key];
    return;
  }
  if(FIREBASE_UID){
    delete FIREBASE_DATOS[key];
    try{
      await firebase.firestore().collection('usuarios').doc(FIREBASE_UID)
        .update({['datos.'+key]: firebase.firestore.FieldValue.delete()});
    }catch(e){
      // Puede fallar porque el documento aún no existía (normal, se ignora) o por
      // permisos (ej. reglas de seguridad no publicadas) — esto último sí se avisa.
      if(e && e.code !== 'not-found'){ console.error('Error borrando en la nube:', e); avisarErrorFirebase(e); }
    }
    return;
  }
  if(HAS_CLAUDE_STORAGE){
    try{ await window.storage.delete(key, false); }catch(e){}
  } else {
    try{ localStorage.removeItem(key); }catch(e){}
  }
}
// Borra muchas claves a la vez en UNA sola llamada a la nube (mucho más rápido que
// llamar storageDelete una por una — cada llamada individual implica ida y vuelta
// por internet, y borrar un perfil completo puede ser ~50 claves).
async function storageDeleteMuchos(keys){
  if(keys.length === 0) return;
  if(FIREBASE_UID){
    keys.forEach(k => delete FIREBASE_DATOS[k]);
    try{
      const updates = {};
      keys.forEach(k => { updates['datos.'+k] = firebase.firestore.FieldValue.delete(); });
      await firebase.firestore().collection('usuarios').doc(FIREBASE_UID).update(updates);
    }catch(e){
      if(e && e.code !== 'not-found'){ console.error('Error borrando en la nube:', e); avisarErrorFirebase(e); }
    }
    return;
  }
  // Local (Claude storage o localStorage): ya son instantáneos, se borran en paralelo.
  await Promise.all(keys.map(k => storageDelete(k)));
}

function buildCalendarHTML(c, analisis){
  const dias = LANG==='en' ? DIAS_CORTOS_EN : DIAS_CORTOS;
  let html = `<div class="calgrid">` + dias.map(d=>`<div class="calhead">${d}</div>`).join("");

  for(let i=0;i<firstDow;i++) html += `<div class="calcell empty"></div>`;
  const promedio = analisis.promedio;
  c.rows.forEach(r=>{
    const dayNum = parseInt(r.fecha.slice(8,10));

      <div class="d">${dayNum}</div>
      <div class="k">${r.consumo!==null ? r.consumo.toFixed(0)+' kWh' : '—'}</div>

  });
  html += `</div>`;

}

function dateRange(a,b){
  const out=[]; let d=new Date(a+"T00:00:00"); const end=new Date(b+"T00:00:00");
  while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }

const FUTURE_CYCLE_LEN = 30;
const BASE_YEAR = 2026;
function getCycleStart(){
  // El perfil "default" es la cuenta real con facturas de Ene-Jun ya cargadas,
  // así que sus meses estimados siguen encadenados desde el fin de Junio real.
  // Cualquier otro perfil (propiedad nueva) no tiene esas facturas, así que
  // arranca su propio ciclo desde el 1 de enero del año base.
  return PERFIL_ACTIVO === 'default' ? "2026-06-24" : `${BASE_YEAR}-01-01`;
}

function addDays(fecha, n){
  const d = new Date(fecha+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

// ---- Ajustes manuales de fecha de corte por mes (para cuando tu distribuidora factura
// una cantidad de días distinta a la estimada). Se guardan y afectan a todos
// los meses siguientes en cadena.
let FUTURE_OVERRIDES = {};
async function loadOverrides(){
  try{
    let v = await storageGet(`future_overrides:${PERFIL_ACTIVO}`);
    if(!v && PERFIL_ACTIVO === 'default'){ v = await storageGet('future_overrides'); }
    FUTURE_OVERRIDES = v ? JSON.parse(v) : {};
  }catch(e){ FUTURE_OVERRIDES = {}; }
}
async function saveOverrides(){
  await storageSet(`future_overrides:${PERFIL_ACTIVO}`, JSON.stringify(FUTURE_OVERRIDES));
}
async function setCutoffOverride(year, mes, desde, hasta){
  const actual = FUTURE_OVERRIDES[`${year}:${mes}`] || {};
  FUTURE_OVERRIDES[`${year}:${mes}`] = {
    desde: desde !== undefined ? desde : actual.desde,
    hasta: hasta !== undefined ? hasta : actual.hasta
  };
  await saveOverrides();
  buildFutureRanges();
}
async function clearCutoffOverride(year, mes){
  delete FUTURE_OVERRIDES[`${year}:${mes}`];
  await saveOverrides();
  buildFutureRanges();
}

// Secuencia ordenada de meses "estimados": para el perfil real, Julio-2026 en adelante
// (Ene-Jun 2026 ya son facturas reales); para otros perfiles, los 12 meses desde Enero.
function futureSequence(){
  const seq = [];
  const esDefault = PERFIL_ACTIVO === 'default';
  const lastYear = Math.max(BASE_YEAR, ...YEARS) + 1; // +1 año de margen
  for(let y = BASE_YEAR; y <= lastYear; y++){
    const startIdx = (esDefault && y===BASE_YEAR) ? 6 : 0; // en 2026 el perfil real arranca en Julio (índice 6)
    for(let mi = startIdx; mi < 12; mi++){
      seq.push({year:y, mes:MESES[mi]});
    }
  }
  return seq;
}

let FUTURE_RANGES_MAP = {};
function buildFutureRanges(){
  FUTURE_RANGES_MAP = {};
  let cursor = getCycleStart();
  futureSequence().forEach(({year, mes})=>{
    const key = `${year}:${mes}`;
    const override = FUTURE_OVERRIDES[key];
    const desde = (override && override.desde) ? override.desde : cursor;
    const hasta = (override && override.hasta) ? override.hasta : addDays(desde, FUTURE_CYCLE_LEN-1);
    FUTURE_RANGES_MAP[key] = {desde, hasta};
    cursor = addDays(hasta, 1);
  });
}

function cycleRange(year, mes){
  const key = `${year}:${mes}`;
  return FUTURE_RANGES_MAP[key] || {desde: getCycleStart(), hasta: getCycleStart()};
}

function dayList(year, mes){
  if(PERFIL_ACTIVO === 'default' && year===BASE_YEAR && DATA[mes]) return dateRange(DATA[mes].desde, DATA[mes].hasta);
  const r = cycleRange(year, mes);
  return dateRange(r.desde, r.hasta);
}

    rates.push(d.valor_consumo/d.consumo);
    subRatios.push(d.subsidio_cruzado/d.consumo);

  return { tarifaProm: avg(rates), subsidioProm: avg(subRatios), alumbradoProm: avg(alumRatios) };
}

async function compartirApp(){
  const esHosteada = location.protocol === 'http:' || location.protocol === 'https:';

  if(esHosteada){
    // La app está publicada en una dirección real: compartimos el LINK, no el archivo.
    const url = location.origin + location.pathname;
    try{
      if(navigator.share){
        await navigator.share({
          title: 'Registro de Consumo Eléctrico',
          text: 'App para llevar el registro de tu consumo eléctrico.',
          url: url
        });
        return;
      }
    }catch(e){
      if(e && e.name === 'AbortError') return; // el usuario cerró el share sheet a propósito
      console.error('No se pudo usar el compartir nativo, se copiará el link en su lugar:', e);
    }
    // Sin soporte para compartir (ej. computadora de escritorio): copiar el link al portapapeles.
    try{
      await navigator.clipboard.writeText(url);
      alert(LANG==='en' ? `Link copied to clipboard:\n${url}` : `Se copió el link al portapapeles:\n${url}`);
    }catch(e){
      window.prompt(LANG==='en' ? 'Copy this link to share it:' : 'Copia este link para compartirlo:', url);
    }
    return;
  }

  // Abierta como archivo local (sin hosting real): no hay un link que compartir,
  // así que se comparte/descarga el propio archivo .html, como antes.
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const filename = 'registro_consumo_electrico.html';

  let compartidoOk = false;
  try{
    const file = new File([html], filename, {type:'text/html'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title: 'Registro de Consumo Eléctrico',
        text: 'App para llevar el registro de tu consumo eléctrico.'
      });
      compartidoOk = true;
    }
  }catch(e){
    if(e && e.name === 'AbortError') return; // el usuario cerró el share sheet a propósito, no es un error
    console.error('No se pudo usar el compartir nativo, se intentará descargar en su lugar:', e);
  }
  if(compartidoOk) return;

  // Si el compartir nativo no está disponible o falló por cualquier motivo (ej. abierto
  // como archivo local sin conexión segura), siempre se puede caer a la descarga manual.
  try{
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert(LANG==='en'
      ? 'The file was downloaded. Now you can attach it in WhatsApp, email, etc.'
      : 'Se descargó el archivo. Ahora puedes adjuntarlo en WhatsApp, correo, etc.');
  }catch(e){
    console.error('Error al descargar:', e);
    alert(LANG==='en' ? "Couldn't share or download the app automatically." : 'No se pudo compartir ni descargar la app automáticamente.');
  }
}

// Flujo completo al tocar "Compartir esta app": primero avisa que hay que borrar los
// datos, ofrece exportar un respaldo antes de borrar, borra todo, y recién ahí comparte.
async function iniciarFlujoCompartir(){
  const esHosteada = location.protocol === 'http:' || location.protocol === 'https:';
  if(esHosteada || PERFILES.length === 0){
    // Si está publicada, compartir el link nunca toca los datos de nadie — se comparte directo.
    // Si no hay ningún perfil ni datos que proteger, tampoco hay nada que preguntar.
    await compartirApp();
    return;
  }

  const msgBorrar = LANG==='en'
    ? "To share this app safely, the data saved on this device needs to be wiped first (every profile, years, readings, invoices). Continue?"
    : "Para compartir la app de forma segura, primero hay que borrar los datos guardados en este dispositivo (todos los perfiles, años, lecturas y facturas). ¿Deseas continuar?";
  if(!confirm(msgBorrar)) return;

  const msgExportar = LANG==='en'
    ? "Do you want to export a backup (JSON) of your data before wiping and sharing? If you say No, it will just skip the backup and continue wiping + sharing anyway."
    : "¿Quieres exportar un respaldo (JSON) de tus datos antes de borrar y compartir? Si dices No, simplemente se salta el respaldo y sigue con borrar + compartir de todas formas.";
  if(confirm(msgExportar)){
    await exportarJSON();
    await new Promise(r=>setTimeout(r, 400)); // dar tiempo a que la descarga del respaldo se dispare bien
  }

  await borrarTodoParaCompartir();
  volverAPantallaDeInicio();
  await compartirApp();
}

// Reduce el tamaño de la foto antes de subirla (menos espacio, más rápido).
function comprimirImagen(file, maxDim, calidad){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * (maxDim/w)); w = maxDim; }
          else { w = Math.round(w * (maxDim/h)); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob)=> blob ? resolve(blob) : reject(new Error('No se pudo procesar la imagen')), 'image/jpeg', calidad);
      };
      img.onerror = ()=> reject(new Error('No se pudo leer la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// Sube la foto del medidor a Cloudinary (gratis, sin tarjeta) y devuelve el link para
// guardarlo junto a la lectura de ese día.
const CLOUDINARY_CLOUD_NAME = 'zcuh5bjn';
const CLOUDINARY_UPLOAD_PRESET = 'ehrzlu4w';
async function subirFotoMedidor(file, fecha){
  try{
    const blob = await comprimirImagen(file, 1280, 0.72);
    const formData = new FormData();
    formData.append('file', blob);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData
    });
    if(!resp.ok){
      const errData = await resp.json().catch(()=>({}));
      throw new Error(errData.error ? errData.error.message : `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    return data.secure_url;
  }catch(e){
    console.error('Error subiendo la foto del medidor:', e);
    alert(LANG==='en' ? "Couldn't upload the photo. Check your connection and try again." : 'No se pudo subir la foto. Revisa tu conexión e intenta de nuevo.');
    return null;
  }
}

// ---- Respaldo: Exportar / Importar JSON (datos exactos, reimportables)
// Exporta el respaldo de un perfil específico, aunque no sea el que está activo en este momento
// (se usa al borrar un perfil desde la pantalla principal, sin necesidad de entrar a la app primero).
// Revisa si un perfil tiene algo guardado (datos del cliente o alguna lectura) —
// para no ofrecer un respaldo de un perfil que en realidad está vacío.
async function perfilTieneDatos(perfilId){
  const p = PERFILES.find(x=>x.id===perfilId);
  if(p && (p.nombre || p.cedula || p.direccion || p.cuenta || p.medidor)) return true;

  let years = [BASE_YEAR];
  try{
    let v = await storageGet(`years:${perfilId}`);
    if(!v && perfilId === 'default') v = await storageGet('years');
    if(v) years = JSON.parse(v);
  }catch(e){}

  for(const year of years){
    for(const mes of MESES){
      let v = await storageGet(`lecturas:${perfilId}:${year}:${mes}`);
      if(!v && perfilId === 'default') v = await storageGet(`lecturas:${year}:${mes}`);
      if(v){
        try{
          const parsed = JSON.parse(v);
          if(parsed && Object.keys(parsed).length > 0) return true;
        }catch(e){}
      }
    }
  }
  return false;
}

async function exportarJSON(){

                 es_tercera_edad: ES_TERCERA_EDAD, cliente: CLIENTE, perfil_activo: PERFIL_ACTIVO,

async function filasFacturacion(year, mes){
  const c = await computeMonth(year, mes);
  const hist = c.hist;
  const subsidioExtra = await loadSubsidioExtra(year, mes);
  const sim = c.consumoIngresado > 0 ? simulador(c.consumoIngresado, subsidioExtra) : null;
  const r2 = n => Math.round(n*100)/100;
  const r4 = n => Math.round(n*10000)/10000;
  const rows = [[]];
  if(hist){
    const real = facturaReal(mes);
    rows.push([LANG==='en'?"REAL BILLING":"FACTURACIÓN REAL"]);
    rows.push([LANG==='en'?"Energy Value":"Valor Consumo", real.valor_consumo]);
    rows.push([LANG==='en'?"Commercialization":"Comercialización", real.comercial]);
    rows.push([LANG==='en'?"Cross Subsidy (+)":"Subsidio Cruzado Solidario (+)", real.subsidio_cruzado]);
    rows.push([LANG==='en'?"Senior Citizen Subsidy (-)":"Subsidio Adulto Mayor (-)", -real.subsidio_adulto]);
    if(real.compensacion) rows.push(["Compensación D.E. 379 (-)", -real.compensacion]);
    rows.push([LANG==='en'?"SE Subtotal":"Subtotal SE", real.subtotalSE]);
    rows.push([LANG==='en'?"Public Lighting":"Alumbrado Público", real.alumbrado]);
    rows.push([LANG==='en'?"SE+AP Total":"Total SE y AP", real.totalSEAP]);
    rows.push([LANG==='en'?"Fire Dept. Fee":"Bomberos", real.bomberos]);
    rows.push([LANG==='en'?"TOTAL BILL":"VALOR TOTAL FACTURA", real.totalFactura]);
    rows.push([]);
  } else {
    const manual = await loadFacturaManual(year, mes);
    if(manual.total!==null && manual.total!==undefined){
      rows.push([LANG==='en'?"ENTERED INVOICE":"FACTURA INGRESADA"]);
      rows.push([LANG==='en'?"Billed Consumption (kWh)":"Consumo Facturado (kWh)", manual.consumo ?? ""]);
      rows.push([LANG==='en'?"TOTAL BILL (entered)":"VALOR TOTAL FACTURA (ingresado)", manual.total]);
      rows.push([]);
    }
  }
  rows.push([LANG==='en'?"TARIFF SIMULATOR":"SIMULADOR CON TARIFA REFERENCIAL"]);
  if(sim){
    rows.push([LANG==='en'?"Period Consumption (kWh)":"Consumo del periodo (kWh)", r2(c.consumoIngresado)]);
    if(sim.esDignidad) rows.push([LANG==='en'?"Note":"Nota", LANG==='en' ? `${DIGNIDAD_KWH} kWh or less this month: Tarifa de la Dignidad applied` : `${DIGNIDAD_KWH} kWh o menos este mes: se aplicó la Tarifa de la Dignidad`]);
    rows.push([sim.esDignidad ? (LANG==='en'?"Dignidad Rate Applied ($/kWh)":"Tarifa de la Dignidad aplicada ($/kWh)") : (LANG==='en'?"Avg. Energy Rate ($/kWh)":"Tarifa energía promedio ($/kWh)"), r4(sim.tarifaProm)]);
    rows.push([LANG==='en'?"Estimated Energy Value":"Valor Consumo estimado", r2(sim.valorConsumo)]);
    rows.push([LANG==='en'?"Commercialization":"Comercialización", r2(FIXED.comercial)]);
    rows.push([LANG==='en'?"Estimated Cross Subsidy (+)":"Subsidio Cruzado estimado (+)", r2(sim.subsidioCruzado)]);
    rows.push([LANG==='en'?"Senior Citizen Subsidy (-)":"Subsidio Adulto Mayor (-)", r2(-FIXED.subsidio_adulto)]);
    rows.push([LANG==='en'?"SE Subtotal":"Subtotal SE", r2(sim.subtotalSE)]);
    rows.push([LANG==='en'?"Estimated Public Lighting":"Alumbrado Público estimado", r2(sim.alumbrado)]);
    rows.push([LANG==='en'?"Estimated SE+AP Total":"Total SE y AP estimado", r2(sim.totalSEAP)]);
    rows.push([LANG==='en'?"Fire Dept. Fee":"Bomberos", r2(FIXED.bomberos)]);
    if(sim.subsidioExtraVal) rows.push([LANG==='en'?"Extraordinary Gov. Subsidy (-)":"Subsidio Extraordinario del Gobierno (-)", r2(-sim.subsidioExtraVal)]);
    rows.push([LANG==='en'?"ESTIMATED TOTAL BILL":"TOTAL FACTURA ESTIMADA", r2(sim.totalFactura)]);
    const realTotal = hist ? facturaReal(mes).totalFactura : null;
    if(realTotal!==null) rows.push([LANG==='en'?"Difference vs. real bill":"Diferencia vs. factura real", sim.totalFactura - realTotal]);
  } else {
    rows.push([LANG==='en'?"Not enough data yet.":"Aún no hay datos suficientes."]);
  }
  return rows;
}

  }
  const wb = XLSX.utils.book_new();
  const headers = LANG==='en'
    ? ["Date","Day","Reading (kWh)","Time","Daily Consumption (kWh)"]
    : ["Fecha","Día","Lectura (kWh)","Hora","Consumo Diario (kWh)"];

async function importarJSON(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || typeof data !== 'object' || !data.meses){
      alert("Este archivo no parece un respaldo válido de esta app.");
      return;
    }
    if(!confirm("Esto reemplazará tus datos actuales con los del respaldo. ¿Continuar?")) return;
    YEARS = data.years && data.years.length ? data.years : [BASE_YEAR];
    await saveYears();
    FUTURE_OVERRIDES = data.future_overrides || {};
    await saveOverrides();
    if(data.date_format){ await saveDateFormat(data.date_format); }
    if(data.es_tercera_edad !== undefined && data.es_tercera_edad !== null){ await saveTerceraEdad(!!data.es_tercera_edad); }
    if(data.cliente){ await actualizarClienteActivo(data.cliente); }
    buildFutureRanges();
    for(const key of Object.keys(data.meses)){
      const idx = key.indexOf(":");
      const year = parseInt(key.slice(0, idx));
      const mes = key.slice(idx+1);
      const d = data.meses[key];
      if(d.entries) await saveEntries(year, mes, d.entries);
      if(d.manual) await saveFacturaManual(year, mes, d.manual);
      if(d.subsidio !== undefined && d.subsidio !== null) await saveSubsidioExtra(year, mes, d.subsidio);
      if(d.meta !== undefined && d.meta !== null) await saveMeta(year, mes, d.meta);
    }
    currentYear = YEARS[0];
    currentTab = "Resumen Anual";
    const sel = document.getElementById('dateFormatSelect');
    if(sel) sel.value = DATE_FORMAT;
    const selEdad = document.getElementById('terceraEdadSelect');
    if(selEdad) selEdad.value = String(ES_TERCERA_EDAD);
    renderYearTabs(); renderSpecialTabs(); renderTabs();
    await renderContent();
    alert("Respaldo restaurado correctamente.");
  }catch(e){
    console.error(e);
    alert("No se pudo leer el archivo. Asegúrate de que sea un respaldo JSON generado por esta misma app.");
  }
}

async function construirDetalleMes(year, mes){
  const c = await computeMonth(year, mes);
  const hist = c.hist;
  const periodo = hist ? {desde:DATA[mes].desde, hasta:DATA[mes].hasta} : cycleRange(year, mes);
  const dias = c.rows.length - 1;
  const filled = c.rows.filter(r=>r.lectura!==null);
  const lectIni = c.rows[0]?.lectura;
  const lectFin = hist ? c.rows[c.rows.length-1]?.lectura : (filled.length ? filled[filled.length-1].lectura : null);

  let total, origen, detalleFactura = "", detalleSimulador = "";
  const subsidioExtra = await loadSubsidioExtra(year, mes);
  const sim = c.consumoIngresado > 0 ? simulador(c.consumoIngresado, subsidioExtra) : null;
  const analisis = analizarMes(c, subsidioExtra);
  let manual = {consumo:null, total:null};

  if(hist){
    const real = facturaReal(mes);
    total = real.totalFactura; origen = "Real (factura)";
    detalleFactura = `
      <table>
        <tr><th>Concepto</th><th>Valor</th></tr>

        <tr><td>Bomberos</td><td>${money(FIXED.bomberos)}</td></tr>
        ${sim.subsidioExtraVal ? `<tr><td>Subsidio Extraordinario del Gobierno (-)</td><td>${money(-sim.subsidioExtraVal)}</td></tr>` : ""}

  return {c, hist, periodo, dias, filled, lectIni, lectFin, total, origen, detalleFactura, detalleSimulador, analisis};
}

async function computeMonth(year, mes){
  let entries = await loadEntries(year, mes);
  const hist = (PERFIL_ACTIVO === 'default' && year===BASE_YEAR && !!DATA[mes]);
  if(hist){
    let changed=false;
    if(entries[DATA[mes].desde]===undefined){ entries[DATA[mes].desde]=DATA[mes].lect_ini; changed=true; }
    if(entries[DATA[mes].hasta]===undefined){ entries[DATA[mes].hasta]=DATA[mes].lect_fin; changed=true; }
    if(changed) await saveEntries(year, mes, entries);
  }
  const days = dayList(year, mes);
  const rows = days.map(fecha => ({fecha, lectura: entryValor(entries[fecha]), hora: entryHora(entries[fecha]), foto: entries[fecha] ? entries[fecha].foto : undefined}));
  for(let i=0;i<rows.length;i++){
    if(i===0 || rows[i].lectura===null || rows[i-1].lectura===null){ rows[i].consumo=null; }
    else { rows[i].consumo = +(rows[i].lectura - rows[i-1].lectura).toFixed(2); }
  }
  const consumoIngresado = rows.reduce((s,r)=> s + (r.consumo||0), 0);
  const fechasDecrecientes = rows.filter(r => r.consumo !== null && r.consumo < 0).map(r => r.fecha);
  return {year, mes, hist, rows, consumoIngresado, entries, fechasDecrecientes};
}

const DIGNIDAD_KWH = 130; // umbral de la Tarifa de la Dignidad para la región Costa
const DIGNIDAD_RATE = 0.04; // $/kWh de la Tarifa de la Dignidad (Pliego Tarifario 2026)
function simulador(consumo, subsidioExtra){
  const {tarifaProm, subsidioProm, alumbradoProm} = tarifaPromedios();
  if(!consumo || consumo<=0) return null;
  const esDignidad = consumo <= DIGNIDAD_KWH;
  const tarifaAplicada = esDignidad ? DIGNIDAD_RATE : tarifaProm;
  const valorConsumo = consumo*tarifaAplicada;
  // El Subsidio Cruzado lo pagan los consumos por ENCIMA del umbral de Dignidad
  // (para financiar el subsidio); quien está dentro del umbral no lo paga.
  const subsidioCruzado = esDignidad ? 0 : consumo*subsidioProm;
  const subtotalSE = valorConsumo + FIXED.comercial + subsidioCruzado - FIXED.subsidio_adulto;
  const alumbrado = consumo*alumbradoProm;
  const totalSEAP = subtotalSE + alumbrado;
  const subsidioExtraVal = subsidioExtra || 0;
  const totalFactura = totalSEAP + FIXED.bomberos - subsidioExtraVal;
  return {valorConsumo, subsidioCruzado, subtotalSE, alumbrado, totalSEAP, subsidioExtraVal, totalFactura, tarifaProm: tarifaAplicada, esDignidad};
}
function facturaReal(mes){
  const d = DATA[mes];
  const subtotalSE = d.valor_consumo + d.comercial + d.subsidio_cruzado - d.subsidio_adulto - d.compensacion;
  const totalSEAP = subtotalSE + d.alumbrado;
  const totalFactura = totalSEAP + d.bomberos;
  return {...d, subtotalSE, totalSEAP, totalFactura};
}

// Analiza los días ya ingresados de un mes: promedio diario, días con consumo
// inusualmente alto, proyección de fin de mes y costo acumulado a la fecha.
function analizarMes(c, subsidioExtra){
  const validDays = c.rows.filter(r => r.consumo !== null);
  const n = validDays.length;
  const promedio = n > 0 ? validDays.reduce((s,r)=>s+r.consumo,0) / n : 0;
  const UMBRAL = 1.5; // 50% por encima del promedio
  const fechasInusuales = (n >= 3)
    ? validDays.filter(r => r.consumo > promedio * UMBRAL).map(r => r.fecha)
    : [];
  const diasTotalesPeriodo = c.rows.length - 1;
  const diasTranscurridos = n;
  const proyeccionConsumo = promedio > 0 ? promedio * diasTotalesPeriodo : 0;
  const {tarifaProm} = tarifaPromedios();
  const costoAcumuladoEnergia = c.consumoIngresado * tarifaProm;
  const simProyeccion = proyeccionConsumo > 0 ? simulador(proyeccionConsumo, subsidioExtra) : null;
  return {
    promedio, n, fechasInusuales, diasTotalesPeriodo, diasTranscurridos,
    proyeccionConsumo, costoAcumuladoEnergia, simProyeccion
  };
}

function prevMonthRef(year, mes){
  const idx = MESES.indexOf(mes);
  if(idx === 0){
    const prevYear = year - 1;
    if(!YEARS.includes(prevYear)) return null;
    return {year: prevYear, mes: "Diciembre"};
  }
  return {year, mes: MESES[idx-1]};
}

async function compararConMesAnterior(year, mes, diasTranscurridos){
  if(diasTranscurridos < 1) return null;
  const prevRef = prevMonthRef(year, mes);
  if(!prevRef) return null;
  const prevC = await computeMonth(prevRef.year, prevRef.mes);
  const subset = prevC.rows.slice(1, diasTranscurridos+1);
  const validSubset = subset.filter(r=>r.consumo!==null);
  if(validSubset.length < diasTranscurridos) return null;
  const prevConsumo = validSubset.reduce((s,r)=>s+r.consumo,0);
  if(prevConsumo <= 0) return null;
  return {prevRef, prevConsumo, diasComparados: diasTranscurridos};
}

// cambio en el historial del navegador para que el botón "Atrás" funcione. Si al
// perfil activo le faltan datos del cliente, no deja ver el resto de la app —

function navegarA(tab, year){
  if(!MODO_INVITADO && tab !== "Ajustes" && !datosClienteCompletos()){
    tab = "Ajustes";
    setTimeout(()=>{
      const card = document.getElementById('datosClienteCard');
      if(card) card.scrollIntoView({block:'start'});
    }, 0);
  }
  if(year !== undefined) currentYear = year;
  currentTab = tab;
  renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
  window.scrollTo(0, 0);
  try{
    history.pushState({screen:'app', tab: currentTab, year: currentYear}, '', '#'+encodeURIComponent(currentTab));
  }catch(e){ /* algunos entornos no permiten pushState (ej. ciertos iframes), se ignora */ }

async function deleteYear(year){
  if(!confirm(`¿Borrar todo el año ${year}? Se perderán todas las lecturas ingresadas en sus 12 meses. Esta acción no se puede deshacer.`)) return;
  const claves = [];
  for(const mes of MESES){
    claves.push(`lecturas:${PERFIL_ACTIVO}:${year}:${mes}`);
    claves.push(`factura_manual:${PERFIL_ACTIVO}:${year}:${mes}`);
    claves.push(`subsidio_extra:${PERFIL_ACTIVO}:${year}:${mes}`);
    claves.push(`meta_ahorro:${PERFIL_ACTIVO}:${year}:${mes}`);
    delete FUTURE_OVERRIDES[`${year}:${mes}`];
  }
  await storageDeleteMuchos(claves);
  await saveOverrides();
  YEARS = YEARS.filter(y2 => y2 !== year);
  await saveYears();
  buildFutureRanges();
  if(currentYear === year){ currentYear = BASE_YEAR; currentTab = "Resumen Anual"; }
  renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
  if(document.getElementById('drawerBody')){ drawerLevel = 'root'; renderDrawer(); }
}

      }, {active: PERFIL_ACTIVO===p.id});
      main.style.flex = '1';
      row.appendChild(main);
      const del = document.createElement('span');
      del.textContent = '✕';
      del.title = LANG==='en' ? `Delete profile ${landingProfileLabel(p)}` : `Borrar el perfil ${landingProfileLabel(p)}`;
      del.style.cssText = 'padding:6px 10px; color:var(--danger); cursor:pointer; font-size:.8rem;';
      del.onclick = async (e)=>{
        e.stopPropagation();
        if(!confirm(LANG==='en' ? `Delete profile "${landingProfileLabel(p)}"? This cannot be undone.` : `¿Borrar el perfil "${landingProfileLabel(p)}"? Esta acción no se puede deshacer.`)) return;

        if(await perfilTieneDatos(p.id)){
          const msgExportar = LANG==='en'
            ? `Do you want to export a backup (JSON) of "${landingProfileLabel(p)}" before deleting it?`
            : `¿Quieres exportar un respaldo (JSON) de "${landingProfileLabel(p)}" antes de borrarlo?`;
          if(confirm(msgExportar)){
            await exportarJSONDePerfil(p.id);
            await new Promise(r=>setTimeout(r, 400));
          }
        }

        await borrarPerfil(p.id);
        closeDrawer();
        volverAPantallaDeInicio();
      };
      row.appendChild(del);
      panel.appendChild(row);
    });
    panel.appendChild(drawerRow(`+ ${LANG==='en'?'New profile':'Nuevo perfil'}`, async ()=>{
      await nuevoPerfil();
      currentTab = "Ajustes";
      closeDrawer();
      renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
      const card = document.getElementById('datosClienteCard');
      if(card) card.scrollIntoView({block:'start'});
    }, {}));

    const divider = document.createElement('div');
    divider.textContent = LANG==='en' ? 'YEARS' : 'AÑOS';
    divider.style.cssText = 'font-size:.7rem; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; margin:16px 0 6px; font-weight:700;';
    panel.appendChild(divider);

    YEARS.forEach(year=>{
      const row = document.createElement('div');
      row.style.cssText = 'display:flex; align-items:center; gap:6px; margin-bottom:2px;';
      const main = drawerRow(`🗓️ ${year}`, ()=>{
        currentYear = year; drawerLevel = 'months'; drawerYear = year; renderDrawer();
      }, {active: currentYear===year});
      main.style.flex = '1';
      row.appendChild(main);
      if(year !== BASE_YEAR){
        const del = document.createElement('span');
        del.textContent = '✕';
        del.title = LANG==='en' ? `Delete year ${year}` : `Borrar el año ${year}`;
        del.style.cssText = 'padding:6px 10px; color:var(--danger); cursor:pointer; font-size:.8rem;';
        del.onclick = (e)=>{ e.stopPropagation(); deleteYear(year); };
        row.appendChild(del);
      }
      panel.appendChild(row);
    });

    panel.appendChild(drawerRow(`+ ${LANG==='en'?'Add year':'Agregar año'}`, async ()=>{ await addYear(); drawerLevel='root'; renderDrawer(); }, {}));

  } else if(drawerLevel === 'months'){
    const back = document.createElement('div');
    back.textContent = `‹ ${drawerYear}`;
    back.style.cssText = 'font-weight:800; font-size:1.05rem; margin-bottom:14px; cursor:pointer; color:var(--accent);';
    back.onclick = ()=>{ drawerLevel = 'root'; renderDrawer(); };
    panel.appendChild(back);

    MESES.forEach(mes=>{
      panel.appendChild(drawerRow(mesLabel(mes), ()=>{
        closeDrawer(); navegarA(mes, drawerYear);
      }, {active: currentTab===mes && currentYear===drawerYear}));
    });
  }
}

async function renderContent(){
  const el = document.getElementById('content');
  const pdfBtn = document.getElementById('generarPdfBtn');
  if(pdfBtn) pdfBtn.style.display = currentTab==="Ajustes" ? "none" : "";
  try{
    if(currentTab==="Ajustes"){ el.innerHTML = ajustesHTML(); attachAjustesEvents(); return; }
    if(currentTab==="Resumen Anual"){ el.innerHTML = await resumenHTML(currentYear); await resumenChart(currentYear); attachDiasPendientesEvents(); return; }
    if(currentTab==="Tarifa Eléctrica"){ el.innerHTML = tarifaHTML(); return; }
    el.innerHTML = await monthHTML(currentYear, currentTab);
    attachMonthEvents(currentYear, currentTab);
    await monthChart(currentYear, currentTab);
  } catch(err){
    console.error('Error al mostrar el contenido:', err);
    if(el && !el.innerHTML){
      el.innerHTML = `<div class="card"><div class="note" style="color:var(--danger);">Ocurrió un error mostrando esta sección. Si estás en una app como WhatsApp, prueba abrir el archivo con Safari (o desde el link de Claude). Detalle: ${(err && err.message) ? err.message : err}</div></div>`;
    }
  }
}

function attachAjustesEvents(){
  const cerrarSesionBtn = document.getElementById('cerrarSesionBtn');
  if(cerrarSesionBtn) cerrarSesionBtn.addEventListener('click', cerrarSesion);
  const borrarCuentaBtn = document.getElementById('borrarCuentaBtn');
  if(borrarCuentaBtn) borrarCuentaBtn.addEventListener('click', borrarCuenta);
  const irALoginBtn = document.getElementById('irALoginBtn');
  if(irALoginBtn){
    irALoginBtn.addEventListener('click', ()=>{
      try{ localStorage.removeItem('modo_sin_cuenta'); }catch(e){}
      location.reload();
    });
  }

  const sel = document.getElementById('dateFormatSelect');
  sel.value = DATE_FORMAT;
  sel.addEventListener('change', async ()=>{ await saveDateFormat(sel.value); });

  const selEdad = document.getElementById('terceraEdadSelect');
  selEdad.value = String(ES_TERCERA_EDAD);
  selEdad.addEventListener('change', async ()=>{ await saveTerceraEdad(selEdad.value==='true'); });

  const selPais = document.getElementById('paisSelect');
  selPais.value = PAIS;
  selPais.addEventListener('change', async ()=>{ await savePais(selPais.value); });

  const selLang = document.getElementById('langSelect');
  selLang.value = LANG;
  selLang.addEventListener('change', async ()=>{
    const valoresSinGuardar = {};
    document.querySelectorAll('.cliente-field').forEach(inp => { valoresSinGuardar[inp.id] = inp.value; });
    await saveLang(selLang.value);
    actualizarTitulos();
    renderSpecialTabs(); renderTabs(); renderYearTabs(); renderContent();
    Object.keys(valoresSinGuardar).forEach(id => {
      const inp = document.getElementById(id);
      if(inp) inp.value = valoresSinGuardar[id];
    });
  });

  const themeBtn = document.getElementById('themeToggleBtn');
  themeBtn.textContent = THEME === 'light' ? t('theme_light') : t('theme_dark');
  themeBtn.addEventListener('click', async ()=>{
    await saveTheme(THEME==='light'?'dark':'light');
    themeBtn.textContent = THEME === 'light' ? t('theme_light') : t('theme_dark');
  });

  const expBtn = document.getElementById('exportarJsonBtn');
  expBtn.textContent = t('btn_export');
  expBtn.addEventListener('click', exportarJSON);

  const impBtn = document.getElementById('importarJsonBtn');
  impBtn.textContent = t('btn_import');
  const impFile = document.getElementById('importarJsonFile');
  impBtn.addEventListener('click', ()=> impFile.click());
  impFile.addEventListener('change', async (e)=>{
    if(e.target.files.length) await importarJSON(e.target.files[0]);
    e.target.value = "";
  });

  document.getElementById('exportarCsvBtn').addEventListener('click', exportarExcel);

  const perfilSelect = document.getElementById('perfilSelect');
  if(perfilSelect){
    perfilSelect.value = PERFIL_ACTIVO;
    perfilSelect.addEventListener('change', async ()=>{
      await cambiarPerfilActivo(perfilSelect.value);
      renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
    });
  }

  const camposCliente = Array.from(document.querySelectorAll('.cliente-field'));
  const guardarClienteBtn = document.getElementById('guardarClienteBtn');
  const nuevoPerfilBtn = document.getElementById('nuevoPerfilBtn');
  const notaIncompleto = document.getElementById('clienteIncompletoNote');

  function validarCamposCliente(){
    const completos = camposCliente.every(inp => inp.value.trim() !== '');
    guardarClienteBtn.disabled = !completos;
    nuevoPerfilBtn.disabled = !completos;
    guardarClienteBtn.style.opacity = completos ? '1' : '.5';
    nuevoPerfilBtn.style.opacity = completos ? '1' : '.5';
    guardarClienteBtn.style.cursor = completos ? 'pointer' : 'not-allowed';
    nuevoPerfilBtn.style.cursor = completos ? 'pointer' : 'not-allowed';
    if(notaIncompleto) notaIncompleto.style.display = completos ? 'none' : 'block';
    return completos;
  }
  camposCliente.forEach((inp, idx)=>{
    inp.addEventListener('input', validarCamposCliente);
    inp.addEventListener('keydown', (e)=>{
      if(e.key !== 'Enter') return;
      e.preventDefault();
      const next = camposCliente[idx+1];
      if(next){ next.focus(); next.select(); }
      else if(validarCamposCliente()){ guardarClienteBtn.click(); }
    });
  });
  validarCamposCliente();

  guardarClienteBtn.addEventListener('click', async ()=>{
    if(!validarCamposCliente()) return;
    await actualizarClienteActivo({
      nombre: document.getElementById('clienteNombre').value,
      cedula: document.getElementById('clienteCedula').value,
      direccion: document.getElementById('clienteDireccion').value,
      cuenta: document.getElementById('clienteCuenta').value,
      medidor: document.getElementById('clienteMedidor').value,
    });
    await saveCiudad(document.getElementById('clienteCiudad').value.trim());
    await saveBomberosManual(document.getElementById('clienteBomberosManual').value);
    navegarA("Resumen Anual");
  });
  nuevoPerfilBtn.addEventListener('click', async ()=>{
    if(!validarCamposCliente()) return;
    await nuevoPerfil();
    renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
    const card = document.getElementById('datosClienteCard');
    if(card) card.scrollIntoView({block:'start'});
  });
  const borrarPerfilBtn = document.getElementById('borrarPerfilBtn');
  if(borrarPerfilBtn){
    borrarPerfilBtn.addEventListener('click', async ()=>{
      if(!confirm(LANG==='en' ? 'Delete this profile? This cannot be undone.' : '¿Borrar este perfil? Esta acción no se puede deshacer.')) return;

      if(await perfilTieneDatos(PERFIL_ACTIVO)){
        const msgExportar = LANG==='en'
          ? 'Do you want to export a backup (JSON) of this profile before deleting it?'
          : '¿Quieres exportar un respaldo (JSON) de este perfil antes de borrarlo?';
        if(confirm(msgExportar)){
          await exportarJSON();
          await new Promise(r=>setTimeout(r, 400));
        }
      }

      await borrarPerfil(PERFIL_ACTIVO);
      volverAPantallaDeInicio();
    });
  }
  const borrarTodoBtn = document.getElementById('borrarTodoBtn');
  if(borrarTodoBtn){
    borrarTodoBtn.addEventListener('click', async ()=>{
      const msg1 = LANG==='en'
        ? 'This will permanently delete EVERY profile and all their data (years, readings, invoices, client info). This cannot be undone. Continue?'
        : 'Esto borrará PERMANENTEMENTE todos los perfiles y todos sus datos (años, lecturas, facturas, datos del cliente). No se puede deshacer. ¿Continuar?';
      if(!confirm(msg1)) return;
      const msg2 = LANG==='en' ? 'Are you sure? This is your last chance to cancel.' : '¿Estás seguro? Esta es tu última oportunidad para cancelar.';
      if(!confirm(msg2)) return;
      await borrarTodoParaCompartir();
      volverAPantallaDeInicio();
    });
  }

async function diasPendientesInfo(){
  const hoy = todayISO();
  for(const year of YEARS){
    for(const mes of MESES){
      const c = await computeMonth(year, mes);
      const periodo = c.hist ? {desde: DATA[mes].desde, hasta: DATA[mes].hasta} : cycleRange(year, mes);
      if(hoy >= periodo.desde && hoy <= periodo.hasta){
        const faltantes = c.rows.filter(r => r.fecha <= hoy && r.lectura === null).map(r => r.fecha);
        return {year, mes, faltantes};
      }
    }
  }
  return null;
}

async function guardarFilaPendiente(fecha, year, mes){
  const lectEl = document.querySelector(`.pend-lect-input[data-fecha="${fecha}"]`);
  const horaEl = document.querySelector(`.pend-hora-input[data-fecha="${fecha}"]`);
  const val = lectEl ? parseFloat(lectEl.value) : NaN;
  const hora = horaEl ? horaEl.value : "";
  let entries = await loadEntries(year, mes);
  const fotoExistente = entries[fecha] ? entries[fecha].foto : undefined;
  if(isNaN(val)){
    delete entries[fecha];
  } else {
    entries[fecha] = {valor: val, hora};
    if(fotoExistente) entries[fecha].foto = fotoExistente;
  }
  await saveEntries(year, mes, entries);
}

function attachDiasPendientesEvents(){
  const card = document.getElementById('diasPendientesCard');
  if(!card) return;
  const filas = Array.from(card.querySelectorAll('tr[data-fecha]'));
  const lectInputs = filas.map(f => f.querySelector('.pend-lect-input'));
  const horaInputs = filas.map(f => f.querySelector('.pend-hora-input'));

  // Guarda en segundo plano, sin reconstruir la tarjeta — así Enter puede saltar de
  // casilla en casilla igual que en la tabla del mes, sin que el salto se corte a
  // mitad de camino. El conteo de "días pendientes" se pone al día la próxima vez
  // que se vuelva a mostrar Resumen Anual.
  function guardarSinRefrescarPend(inp){
    guardarFilaPendiente(inp.dataset.fecha, parseInt(inp.dataset.year), inp.dataset.mes)
      .catch(err => console.error('Error guardando:', err));
    inp.classList.toggle('hasvalue', inp.value !== '');
  }

  lectInputs.forEach((inp, idx)=>{
    if(!inp) return;
    inp.addEventListener('blur', ()=> guardarSinRefrescarPend(inp));
    inp.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        guardarSinRefrescarPend(inp);
        // Enter en Lectura -> salta directo a la Hora de la MISMA fila
        const horaEl = horaInputs[idx];
        if(horaEl) horaEl.focus();
        return;
      }
      if((e.key === 'Backspace' || e.key === 'Delete') && inp.value === ''){
        // Ya está vacío y vuelves a tocar borrar -> salta hacia atrás, a la Hora del día anterior
        e.preventDefault();
        const horaAnterior = horaInputs[idx-1];
        if(horaAnterior) horaAnterior.focus();
      }
    });
  });

  horaInputs.forEach((inp, idx)=>{
    if(!inp) return;
    inp.addEventListener('blur', ()=> guardarSinRefrescarPend(inp));
    inp.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        guardarSinRefrescarPend(inp);
        // Enter en Hora -> salta directo a la Lectura de la fila SIGUIENTE
        const nextLect = lectInputs[idx+1];
        if(nextLect){ nextLect.focus(); nextLect.select(); }
        return;
      }
      if(e.key === 'Backspace' || e.key === 'Delete'){
        e.preventDefault();
        if(inp.value !== ''){
          // 1er toque: borra el campo completo de una vez (muestra --:--)
          inp.value = '';
          inp.dispatchEvent(new Event('input', {bubbles:true}));
        } else {
          // 2do toque (ya estaba vacío): salta a la Lectura de esta misma fila
          const lectEl = lectInputs[idx];
          if(lectEl){
            lectEl.focus();
            cursorAlFinalDelValor(lectEl);
          }
        }
      }
    });
  });
}

async function buildStatsSections(year, mes){
  const c = await computeMonth(year, mes);

  const subsidioExtra = await loadSubsidioExtra(year, mes);
  const meta = await loadMeta(year, mes);
  const analisis = analizarMes(c, subsidioExtra);
  ULTIMO_ANALISIS_MES = analisis;
  const comparacionMes = await compararConMesAnterior(year, mes, analisis.diasTranscurridos);

  const tieneFacturaManual = manual.total!==null && manual.total!==undefined;
  let verifHTML = `
    <div class="summary-grid">
      <div class="stat"><div class="num">${c.consumoIngresado.toFixed(0)}</div><div class="lbl">${t('kwh_ingresados')}</div></div>

    </div>`;
  let estado;
  if(hist){
    if(c.rows.filter(r=>r.lectura!==null).length < 2) estado = {cls:"pend", txt:"Faltan lecturas por ingresar"};
    else if(Math.abs(c.consumoIngresado - DATA[mes].consumo) < 0.5) estado = {cls:"ok", txt:"✓ Coincide con la factura real"};
    else estado = {cls:"pend", txt:`Diferencia de ${(c.consumoIngresado-DATA[mes].consumo).toFixed(1)} kWh — revisa tus lecturas`};
  } else if(tieneFacturaManual && manual.consumo!==null){
    if(Math.abs(c.consumoIngresado - manual.consumo) < 0.5) estado = {cls:"ok", txt:"✓ Coincide con la factura que ingresaste"};
    else estado = {cls:"pend", txt:`Diferencia de ${(c.consumoIngresado-manual.consumo).toFixed(1)} kWh — revisa tus lecturas`};
  } else {
    estado = {cls:"pend", txt: c.consumoIngresado>0 ? "Sin factura real todavía — acumulando lecturas" : "Ingresa tus lecturas diarias"};
  }
  verifHTML += `<div class="estado ${estado.cls}">${estado.txt}</div>`;

  let realHTML = "";
  if(hist){
    const real = facturaReal(mes);
    realHTML = `
    <h3>Facturación Real</h3>
    <div class="kv"><span>Valor Consumo</span><span class="v blue">${money(real.valor_consumo)}</span></div>
    <div class="kv"><span>Comercialización</span><span class="v blue">${money(real.comercial)}</span></div>
    <div class="kv"><span>Subsidio Cruzado Solidario (+)</span><span class="v blue">${money(real.subsidio_cruzado)}</span></div>
    <div class="kv"><span>Subsidio Adulto Mayor (-)</span><span class="v blue">${money(-real.subsidio_adulto)}</span></div>
    ${real.compensacion ? `<div class="kv"><span>Compensación D.E. 379 (-)</span><span class="v blue">${money(-real.compensacion)}</span></div>` : ""}
    <div class="kv"><span>Subtotal Servicio Eléctrico</span><span class="v">${money(real.subtotalSE)}</span></div>
    <div class="kv"><span>Alumbrado Público</span><span class="v blue">${money(real.alumbrado)}</span></div>
    <div class="kv"><span>Total SE y AP</span><span class="v">${money(real.totalSEAP)}</span></div>
    <div class="kv"><span>Bomberos</span><span class="v blue">${money(real.bomberos)}</span></div>
    <div class="kv totalrow"><span>VALOR TOTAL FACTURA</span><span class="v">${money(real.totalFactura)}</span></div>`;
  } else {
    realHTML = `
    <h3>Valor Obtenido de la Factura</h3>
    <div class="note" style="margin-top:0;">Cuando te llegue la factura de este mes, ingresa aquí sus datos para compararlos con lo que anotaste tú.</div>
    <label style="font-size:.75rem; color:var(--sub); display:block; margin:8px 0 3px;">Consumo facturado (kWh)</label>
    <input type="number" step="0.01" id="facturaManualConsumo" value="${manual.consumo ?? ''}" placeholder="Ej: 900" style="width:150px;">
    <label style="font-size:.75rem; color:var(--sub); display:block; margin:8px 0 3px;">Valor total de la factura ($)</label>
    <input type="number" step="0.01" id="facturaManualTotal" value="${manual.total ?? ''}" placeholder="Ej: 105.30" style="width:150px;">
    <button id="guardarFacturaManualBtn" style="margin-top:10px;">Guardar factura</button>
    ${tieneFacturaManual ? `
    <div class="kv totalrow" style="margin-top:12px;"><span>Valor obtenido de la factura</span><span class="v blue">${money(manual.total)}</span></div>
    <div class="kv"><span>Consumo ingresado manualmente</span><span class="v">${kwh(c.consumoIngresado)}</span></div>
    ` : ""}`;
  }

  const sim = simulador(c.consumoIngresado, subsidioExtra);
  let simHTML = `<h3>Simulador con Tarifa Referencial</h3>`;
  simHTML += `
    <label style="font-size:.75rem; color:var(--sub); display:block; margin:2px 0 3px;">Subsidio / compensación extraordinaria del Gobierno este mes ($, se resta del total)</label>
    <input type="number" step="0.01" id="subsidioExtraInput" value="${subsidioExtra || ''}" placeholder="0.00">
    <button id="guardarSubsidioBtn" style="margin-top:8px; margin-bottom:8px;">Aplicar</button>
    <div class="note" style="margin-bottom:10px;">Este campo normalmente lo dejas vacío. Solo si el Gobierno anuncia alguna compensación especial en tu factura de ese mes (como pasó en Mayo con el Decreto 379), ingresa aquí ese monto para que se reste del total estimado.</div>`;
  if(!sim){
    simHTML += `<div class="note">Ingresa lecturas para ver la estimación.</div>`;
  } else {
    simHTML += `
    <div class="kv"><span>Consumo del periodo</span><span class="v green">${kwh(c.consumoIngresado)}</span></div>
    ${sim.esDignidad ? `<div class="note" style="color:var(--ok); margin:4px 0 8px;">✅ Este mes consumió ${DIGNIDAD_KWH} kWh o menos, así que se aplicó la Tarifa de la Dignidad (más barata) en vez del promedio normal.</div>` : ""}
    <div class="kv"><span>${sim.esDignidad ? "Tarifa de la Dignidad aplicada" : "Tarifa energía promedio"}</span><span class="v green">${rate(sim.tarifaProm)}/kWh</span></div>
    <div class="kv"><span>Valor Consumo estimado</span><span class="v">${money(sim.valorConsumo)}</span></div>
    <div class="kv"><span>Comercialización</span><span class="v green">${money(FIXED.comercial)}</span></div>
    <div class="kv"><span>Subsidio Cruzado estimado (+)</span><span class="v">${money(sim.subsidioCruzado)}</span></div>
    <div class="kv"><span>Subsidio Adulto Mayor (-)</span><span class="v green">${money(-FIXED.subsidio_adulto)}</span></div>
    <div class="kv"><span>Subtotal SE</span><span class="v">${money(sim.subtotalSE)}</span></div>
    <div class="kv"><span>Alumbrado Público estimado</span><span class="v">${money(sim.alumbrado)}</span></div>
    <div class="kv"><span>Total SE y AP estimado</span><span class="v">${money(sim.totalSEAP)}</span></div>
    <div class="kv"><span>Bomberos</span><span class="v green">${money(FIXED.bomberos)}</span></div>
    ${sim.subsidioExtraVal ? `<div class="kv"><span>Subsidio extraordinario del Gobierno (-)</span><span class="v blue">${money(-sim.subsidioExtraVal)}</span></div>` : ""}
    <div class="kv totalrow"><span>TOTAL FACTURA ESTIMADA</span><span class="v">${money(sim.totalFactura)}</span></div>
    ${hist ? `<div class="kv"><span>Diferencia vs. factura real</span><span class="v">${money(sim.totalFactura - facturaReal(mes).totalFactura)}</span></div>` : ""}
    ${(!hist && tieneFacturaManual) ? `<div class="kv"><span>Diferencia vs. factura ingresada</span><span class="v">${money(sim.totalFactura - manual.total)}</span></div>` : ""}
    `;
  }

  let proyeccionHTML = "";
  proyeccionHTML += analisis.n < 2 ? `<div class="note">Ingresa al menos 2 días con lectura para ver la proyección de este mes.</div>` : `
    <div class="summary-grid">
      <div class="stat"><div class="num">${analisis.promedio.toFixed(1)}</div><div class="lbl">kWh promedio/día</div></div>
      <div class="stat"><div class="num">${analisis.diasTranscurridos} / ${analisis.diasTotalesPeriodo}</div><div class="lbl">Días con dato / periodo</div></div>
    </div>
    <div class="kv"><span>Costo acumulado a la fecha (solo energía)</span><span class="v blue">${money(analisis.costoAcumuladoEnergia)}</span></div>
    <div class="kv"><span>Proyección de consumo a fin de mes</span><span class="v">${kwh(analisis.proyeccionConsumo)}</span></div>
    <div class="kv totalrow"><span>Proyección de factura total a fin de mes</span><span class="v">${analisis.simProyeccion ? money(analisis.simProyeccion.totalFactura) : "-"}</span></div>
    ${comparacionMes ? (()=>{
      const diff = ((c.consumoIngresado - comparacionMes.prevConsumo) / comparacionMes.prevConsumo) * 100;
      const subiendo = diff > 0;
      return `<div class="note" style="margin-top:8px; color:${Math.abs(diff)<5 ? 'var(--sub)' : (subiendo ? '#e8b169':'var(--ok)')};">${subiendo ? '📈' : '📉'} Vas gastando <b>${Math.abs(diff).toFixed(0)}% ${subiendo ? 'más' : 'menos'}</b> que ${mesLabel(comparacionMes.prevRef.mes)} ${comparacionMes.prevRef.year} a estas alturas (mismos ${comparacionMes.diasComparados} días).</div>`;
    })() : ""}
    `;
  proyeccionHTML += `
    <h3>Meta de gasto mensual</h3>
    <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:8px;">
      <div>
        <label style="font-size:.75rem; color:var(--sub); display:block; margin-bottom:3px;">Meta ($)</label>
        <input type="number" step="0.01" id="metaInput" value="${meta ?? ''}" placeholder="Ej: 100.00" style="width:150px;">
      </div>
      <button id="guardarMetaBtn" style="width:auto; padding:8px 14px;">Guardar meta</button>
    </div>
    <div class="note" style="margin-bottom:10px;">Pon un estimado de cuánto quisieras gastar como máximo este mes en electricidad. Con eso, la app te va avisando si vas por buen camino o si tu consumo actual te va a hacer pasarte de esa meta.</div>
    ${meta && analisis.simProyeccion ? (()=>{
      const pct = Math.min(100, (analisis.simProyeccion.totalFactura/meta)*100);
      const excedido = analisis.simProyeccion.totalFactura > meta;
      return `<div style="background:var(--card2); border-radius:8px; height:22px; overflow:hidden; margin-bottom:6px;">
        <div style="width:${pct}%; height:100%; background:${excedido ? 'var(--danger)' : 'var(--ok)'};"></div>
      </div>
      <div class="note">${excedido ? `⚠️ Tu proyección (${money(analisis.simProyeccion.totalFactura)}) ya supera tu meta de ${money(meta)}.` : `Vas ${pct.toFixed(0)}% de tu meta de ${money(meta)}, según la proyección actual.`}</div>`;
    })() : meta ? `<div class="note">Ingresa más lecturas para calcular tu progreso contra la meta.</div>` : ""}
    `;

  const hoy = todayISO();
  const filaHoy = c.rows.find(r => r.fecha === hoy);
  const faltaHoy = !!filaHoy && filaHoy.lectura === null;
  const faltaHoyHTML = faltaHoy ? `<div class="estado pend" style="margin-top:10px;">📅 Todavía no has ingresado la lectura de hoy (${fmtDate(hoy)}). ¡No dejes que se te acumule!</div>` : "";
  const calendarHTML = buildCalendarHTML(c, analisis);

  return {c, hist, manual, subsidioExtra, meta, analisis, comparacionMes, tieneFacturaManual, verifHTML, realHTML, simHTML, proyeccionHTML, hoy, faltaHoy, faltaHoyHTML, calendarHTML};
}

// Vuelve a calcular y refrescar SOLO las tarjetas de Verificación, Facturación/Simulador
// y Proyección — sin tocar la tabla de lecturas diarias (para no perder el foco/scroll
// mientras escribes). Se llama automáticamente cada vez que guardas una lectura u hora.
async function actualizarStatsEnVivo(year, mes){
  const verifCard = document.getElementById('verifCard');
  const realCard = document.getElementById('realCard');
  const simCard = document.getElementById('simCard');
  const proyeccionCard = document.getElementById('proyeccionCard');
  const diasCalcStat = document.getElementById('diasCalcStat');
  const calendarCard = document.getElementById('calendarCard');
  const faltaHoyBanner = document.getElementById('faltaHoyBanner');
  if(!verifCard && !realCard && !simCard && !proyeccionCard && !calendarCard && !faltaHoyBanner) return; // no estamos viendo este mes

  const s = await buildStatsSections(year, mes);
  if(verifCard) verifCard.innerHTML = s.verifHTML;
  if(realCard) realCard.innerHTML = s.realHTML || '<div class="note">Este mes aún no tiene factura real todavía.</div>';
  if(simCard) simCard.innerHTML = s.simHTML;
  if(proyeccionCard) proyeccionCard.innerHTML = s.proyeccionHTML;
  if(diasCalcStat) diasCalcStat.textContent = `${s.c.rows.filter(r=>r.consumo!==null).length} / ${s.c.rows.length - 1}`;
  if(calendarCard) calendarCard.innerHTML = s.calendarHTML;
  if(faltaHoyBanner) faltaHoyBanner.innerHTML = s.faltaHoyHTML;

  attachStatsCardEvents(year, mes);
}

function attachStatsCardEvents(year, mes){
  const facturaBtn = document.getElementById('guardarFacturaManualBtn');
  if(facturaBtn){
    facturaBtn.addEventListener('click', async ()=>{
      const consumo = parseFloat(document.getElementById('facturaManualConsumo').value);
      const total = parseFloat(document.getElementById('facturaManualTotal').value);
      await saveFacturaManual(year, mes, {consumo: isNaN(consumo)?null:consumo, total: isNaN(total)?null:total});
      await actualizarStatsEnVivo(year, mes);
    });
  }
  const subsidioBtn = document.getElementById('guardarSubsidioBtn');
  if(subsidioBtn){
    subsidioBtn.addEventListener('click', async ()=>{
      const val = parseFloat(document.getElementById('subsidioExtraInput').value) || 0;
      await saveSubsidioExtra(year, mes, val);
      await actualizarStatsEnVivo(year, mes);
    });
  }
  const metaBtn = document.getElementById('guardarMetaBtn');
  if(metaBtn){
    metaBtn.addEventListener('click', async ()=>{
      const val = parseFloat(document.getElementById('metaInput').value);
      await saveMeta(year, mes, isNaN(val)?null:val);
      await actualizarStatsEnVivo(year, mes);
    });
  }
}
