// Pone el cursor al final del valor de un input type=number. setSelectionRange no
// funciona de forma confiable en ese tipo de campo en todos los navegadores, así que
// se cambia brevemente a type=text (donde sí funciona) y se restaura enseguida.
function cursorAlFinalDelValor(inp){
  const tipoOriginal = inp.type;
  try{
    inp.type = 'text';
    inp.setSelectionRange(inp.value.length, inp.value.length);
  }catch(err){ /* se ignora si el navegador tampoco lo permite así */ }
  finally{ inp.type = tipoOriginal; }
}

function attachMonthEvents(year, mes){
  const lectInputs = Array.from(document.querySelectorAll('.lect-input'));
  const horaInputs = Array.from(document.querySelectorAll('.hora-input'));
  const dataRows = Array.from(document.querySelectorAll('.daysbox table tr')).slice(1); // sin la fila de encabezado

  function consumoCellFor(idx){
    const row = dataRows[idx];
    if(!row) return null;
    const tds = row.querySelectorAll('td');
    return tds[3] || null;
  }
  function esInusualPorFecha(fecha){
    return !!(ULTIMO_ANALISIS_MES && ULTIMO_ANALISIS_MES.fechasInusuales.includes(fecha));
  }
  function updateConsumoCell(idx){
    const cell = consumoCellFor(idx);
    const row = dataRows[idx];
    if(!cell) return;
    const fecha = row ? row.dataset.fecha : null;
    const esInusual = fecha ? esInusualPorFecha(fecha) : false;
    if(idx <= 0 || idx >= lectInputs.length){
      cell.textContent = "—";
      if(row) row.style.background = "";
      return;
    }
    const curVal = parseFloat(lectInputs[idx].value);
    const prevVal = parseFloat(lectInputs[idx-1].value);
    if(isNaN(curVal) || isNaN(prevVal)){
      cell.textContent = "—";
      if(row) row.style.background = "";
      return;
    }
    const diff = +(curVal - prevVal).toFixed(2);
    const esDecreciente = diff < 0;
    cell.textContent = kwh(diff) + (esInusual ? ' ⚠️' : '') + (esDecreciente ? ' ⬇️' : '');
    if(row) row.style.background = esDecreciente ? 'rgba(232,177,105,.18)' : (esInusual ? 'rgba(240,113,111,.12)' : '');
    lectInputs[idx].title = esDecreciente ? '⚠️ Esta lectura es menor a la del día anterior — revisa si hubo un error al escribir.' : '';
  }
  // Después de que se recalcula el promedio del mes (tras guardar una lectura), este
  // barrido revisa TODOS los días — porque el promedio pudo cambiar y hacer que un día
  // que antes se veía normal ahora se marque como consumo alto (o viceversa).
  function actualizarTodasLasFilasInusuales(){
    dataRows.forEach((row, idx)=>{ updateConsumoCell(idx); });
    const notaInusual = document.getElementById('notaInusualCard');
    if(notaInusual && ULTIMO_ANALISIS_MES){
      const fechas = ULTIMO_ANALISIS_MES.fechasInusuales;
      notaInusual.style.marginBottom = fechas.length > 0 ? '10px' : '0';
      notaInusual.innerHTML = fechas.length > 0
        ? `⚠️ Se detectaron ${fechas.length} día(s) con consumo inusualmente alto (más de 50% sobre tu promedio del mes): ${fechas.map(fmtDate).join(", ")}. Revisa si quedó algo encendido esos días.`
        : "";
    }
  }

  async function saveRow(fecha){
    const lectEl = document.querySelector(`.lect-input[data-fecha="${fecha}"]`);
    const horaEl = document.querySelector(`.hora-input[data-fecha="${fecha}"]`);
    const val = lectEl ? parseFloat(lectEl.value) : NaN;
    const hora = horaEl ? horaEl.value : "";
    let entries = await loadEntries(year, mes);
    const fotoExistente = entries[fecha] ? entries[fecha].foto : undefined;
    if(isNaN(val)){
      delete entries[fecha];
    } else {
      entries[fecha] = {valor: val, hora};
      if(fotoExistente) entries[fecha].foto = fotoExistente;
    }
    await saveEntries(year, mes, entries);
  }

  // Guarda en segundo plano, actualiza al instante la celda de consumo de esa fila,
  // resalta el casillero igual que las lecturas ya guardadas, y refresca
  // Verificación/Simulador/Proyección — todo sin reconstruir la tabla de
  // lecturas (para no perder el foco/scroll mientras escribes).
  function guardarSinRefrescar(fecha, idx){
    saveRow(fecha).then(()=> actualizarStatsEnVivo(year, mes)).then(()=> actualizarTodasLasFilasInusuales()).catch(err => console.error('Error guardando:', err));
    updateConsumoCell(idx);
    updateConsumoCell(idx+1);
    const lectEl = lectInputs[idx];
    if(lectEl) lectEl.classList.toggle('hasvalue', lectEl.value !== '');
    const horaEl = horaInputs[idx];
    if(horaEl) horaEl.classList.toggle('hasvalue', horaEl.value !== '');
  }

  lectInputs.forEach((inp, idx)=>{
    inp.addEventListener('blur', ()=>{ guardarSinRefrescar(inp.dataset.fecha, idx); });
    inp.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        guardarSinRefrescar(inp.dataset.fecha, idx);
        // Enter en Lectura -> salta directo a la Hora de la MISMA fila, sin refrescar
        const horaEl = horaInputs[idx];
        if(horaEl) horaEl.focus();
        return;
      }
      if((e.key === 'Backspace' || e.key === 'Delete') && inp.value === ''){
        // Ya está vacío y vuelves a tocar borrar -> salta hacia atrás, a la Hora del día anterior
        e.preventDefault();
        const horaAnterior = horaInputs[idx-1];
        if(horaAnterior) horaAnterior.focus();
      }
    });
  });

  horaInputs.forEach((inp, idx)=>{
    inp.addEventListener('blur', ()=>{ guardarSinRefrescar(inp.dataset.fecha, idx); });
    inp.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        guardarSinRefrescar(inp.dataset.fecha, idx);
        // Enter en Hora -> salta directo a la Lectura de la fila SIGUIENTE, sin refrescar
        const nextLect = lectInputs[idx+1];
        if(nextLect){ nextLect.focus(); nextLect.select(); }
        return;
      }
      if(e.key === 'Backspace' || e.key === 'Delete'){
        e.preventDefault();
        if(inp.value !== ''){
          // 1er toque: borra el campo completo de una vez (muestra --:--)
          inp.value = '';
          inp.dispatchEvent(new Event('input', {bubbles:true}));
        } else {
          // 2do toque (ya estaba vacío): salta a la Lectura de esta misma fila
          const lectEl = lectInputs[idx];
          if(lectEl){
            lectEl.focus();
            cursorAlFinalDelValor(lectEl);
          }
        }
      }
    });
  });

  const clearBtn = document.getElementById('clearMonthBtn');
  if(clearBtn){
    clearBtn.addEventListener('click', async ()=>{
      if(!confirm(`¿Borrar todas las lecturas ingresadas en ${mesLabel(mes)} ${year}? Esta acción no se puede deshacer.`)) return;
      await storageDelete(`lecturas:${PERFIL_ACTIVO}:${year}:${mes}`);
      await storageDelete(`factura_manual:${PERFIL_ACTIVO}:${year}:${mes}`);
      await storageDelete(`subsidio_extra:${PERFIL_ACTIVO}:${year}:${mes}`);
      await storageDelete(`meta_ahorro:${PERFIL_ACTIVO}:${year}:${mes}`);
      renderContent();
    });
  }
  const ajustarBtn = document.getElementById('ajustarDiasBtn');
  if(ajustarBtn){
    ajustarBtn.addEventListener('click', async ()=>{
      const inicioEl = document.getElementById('inicioDateInput');
      const dateEl = document.getElementById('cutoffDateInput');
      const nuevoInicio = inicioEl ? inicioEl.value : undefined;
      const nuevaFecha = dateEl.value;
      if(!nuevaFecha){ alert('Elige una fecha de corte.'); return; }
      if(nuevoInicio && nuevoInicio > nuevaFecha){ alert('La fecha de inicio no puede ser posterior a la fecha de corte.'); return; }
      await setCutoffOverride(year, mes, nuevoInicio, nuevaFecha);
      renderContent();
    });
  }
  const restaurarBtn = document.getElementById('restaurarDiasBtn');
  if(restaurarBtn){
    restaurarBtn.addEventListener('click', async ()=>{
      if(!confirm('¿Restaurar el estimado de 30 días para este mes? Los meses siguientes también se recalcularán.')) return;
      await clearCutoffOverride(year, mes);
      renderContent();
    });
  }

  function irAMes(nuevoYear, nuevoMes){
    navegarA(nuevoMes, nuevoYear);
  }
  const prevBtn = document.getElementById('prevMesBtn');
  if(prevBtn){
    prevBtn.addEventListener('click', ()=>{
      const idx = MESES.indexOf(mes);
      if(idx > 0){ irAMes(year, MESES[idx-1]); }
      else if(YEARS.includes(year-1)){ irAMes(year-1, MESES[11]); }
    });
  }
  const nextBtn = document.getElementById('nextMesBtn');
  if(nextBtn){
    nextBtn.addEventListener('click', ()=>{
      const idx = MESES.indexOf(mes);
      if(idx < 11){ irAMes(year, MESES[idx+1]); }
      else if(YEARS.includes(year+1)){ irAMes(year+1, MESES[0]); }
    });
  }

  attachStatsCardEvents(year, mes);

  document.querySelectorAll('.foto-btn').forEach(btn=>{
    const fecha = btn.dataset.fecha;
    const fileInput = document.querySelector(`.foto-input[data-fecha="${fecha}"]`);
    if(!fileInput) return;
    btn.addEventListener('click', async ()=>{
      const entries = await loadEntries(year, mes);
      const fotoUrl = entries[fecha] ? entries[fecha].foto : null;
      if(fotoUrl){ abrirFotoModal(fotoUrl, {year, mes, fecha, btn}); return; }
      const lectEl = document.querySelector(`.lect-input[data-fecha="${fecha}"]`);
      if(!lectEl || lectEl.value === ''){
        alert(LANG==='en' ? 'Enter the reading for this day first, then attach its photo.' : 'Primero ingresa la lectura de este día, luego adjunta su foto.');
        return;
      }
      fileInput.click();
    });
    fileInput.addEventListener('change', async ()=>{
      if(!fileInput.files.length) return;
      const file = fileInput.files[0];
      const textoOriginal = btn.textContent;
      btn.textContent = '⏳';
      btn.disabled = true;
      const url = await subirFotoMedidor(file, fecha);
      if(url){
        let entries = await loadEntries(year, mes);
        if(!entries[fecha]) entries[fecha] = {};
        entries[fecha].foto = url;
        await saveEntries(year, mes, entries);
        btn.textContent = '✅📷';
        btn.style.background = 'var(--card2)';
        btn.style.borderColor = 'var(--ok)';
        btn.style.color = 'var(--ok)';
        btn.title = LANG==='en' ? 'View photo' : 'Ver foto';
      } else {
        btn.textContent = textoOriginal;
      }
      btn.disabled = false;
      fileInput.value = '';
    });
  });
}

// Borra la cuenta de Firebase (desvincula de Google/correo) y todos los datos
// guardados en la nube de ese usuario. Es irreversible, así que pide escribir una
// palabra exacta para confirmar, en vez de solo un Aceptar/Cancelar.
async function borrarCuenta(){
  if(!FIREBASE_UID || !firebase.auth().currentUser) return;
  const email = firebase.auth().currentUser.email;
  const palabra = LANG==='en' ? 'DELETE' : 'BORRAR';
  const escrito = prompt(LANG==='en'
    ? `This will permanently delete your account (${email}) and ALL your cloud data. This cannot be undone.\n\nType ${palabra} to confirm:`
    : `Esto borrará permanentemente tu cuenta (${email}) y TODOS tus datos en la nube. No se puede deshacer.\n\nEscribe ${palabra} para confirmar:`);
  if(escrito !== palabra) return;

  try{
    try{ await firebase.firestore().collection('usuarios').doc(FIREBASE_UID).delete(); }catch(e){ /* si falla, se sigue intentando borrar la cuenta igual */ }
    await firebase.auth().currentUser.delete();
    alert(LANG==='en' ? 'Your account and data were deleted.' : 'Tu cuenta y tus datos fueron borrados.');
    FIREBASE_UID = null;
    FIREBASE_DATOS = {};
    try{ localStorage.removeItem('modo_sin_cuenta'); }catch(e){}
    location.reload();
  }catch(e){
    if(e && e.code === 'auth/requires-recent-login'){
      alert(LANG==='en'
        ? 'For security, you need to sign in again before deleting your account. Sign out, sign back in, and try again.'
        : 'Por seguridad, necesitas iniciar sesión de nuevo antes de borrar tu cuenta. Cierra sesión, vuelve a entrar, e inténtalo otra vez.');
    } else {
      console.error('Error borrando la cuenta:', e);
      alert(LANG==='en' ? "Couldn't delete the account. Try again." : 'No se pudo borrar la cuenta. Intenta de nuevo.');
    }
  }
}

(async function init(){
  // Registro del Service Worker para poder "instalar" la app (PWA) y que funcione sin
  // internet una vez cargada. Si la app se abre como archivo local (file://) o si el
  // archivo sw.js no está publicado junto a ella, esto simplemente no hace nada — no
  // rompe el resto de la app.
  if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
    try{ await navigator.serviceWorker.register('./sw.js'); }catch(e){ /* no disponible, se ignora */ }
  }

  let authModoRegistro = false;
  const authSubmitBtn = document.getElementById('authSubmitBtn');
  const authToggleBtn = document.getElementById('authToggleBtn');

  const ICONO_OJO_CERRADO = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.53 13.53 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>';
  function wireVerPassword(btnId, inputId){
    const btn = document.getElementById(btnId);
    const inp = document.getElementById(inputId);
    btn.addEventListener('click', ()=>{
      const oculto = inp.type === 'password';
      inp.type = oculto ? 'text' : 'password';
      btn.innerHTML = oculto ? ICONO_OJO_CERRADO : ICONO_OJO_ABIERTO;
    });
  }
  wireVerPassword('authVerPasswordBtn', 'authPassword');
  wireVerPassword('authVerPasswordConfirmBtn', 'authPasswordConfirm');

  authSubmitBtn.addEventListener('click', async ()=>{

      if(pass !== passConfirm){ mostrarErrorAuth('Las contraseñas no coinciden.'); return; }
    }
    if(!FIREBASE_OK){ mostrarErrorAuth('No se pudo conectar con el servicio de cuentas. Revisa tu conexión.'); return; }
    authSubmitBtn.disabled = true;
    try{
      if(authModoRegistro){
        await firebase.auth().createUserWithEmailAndPassword(email, pass);
      } else {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
      }
      // El listener de onAuthStateChanged se encarga de continuar desde aquí.
    }catch(e){
      mostrarErrorAuth(traducirErrorFirebase(e));
    }finally{
      authSubmitBtn.disabled = false;
    }
  });

  authToggleBtn.addEventListener('click', ()=>{
    authModoRegistro = !authModoRegistro;
    authError.style.display = 'none';
    document.getElementById('authPasswordConfirm').value = '';
    authConfirmWrap.style.display = authModoRegistro ? 'block' : 'none';
    document.getElementById('authTitle').textContent = authModoRegistro ? 'Crear cuenta' : 'Iniciar sesión';
    document.getElementById('authSub').textContent = authModoRegistro
      ? 'Crea tu cuenta para guardar tus datos y verlos desde cualquier dispositivo.'
      : 'Inicia sesión para ver tus datos desde cualquier dispositivo.';
    authSubmitBtn.textContent = authModoRegistro ? 'Crear cuenta' : 'Iniciar sesión';
    authToggleBtn.textContent = authModoRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Crear una';
  });

  authOlvideBtn.addEventListener('click', async ()=>{
    const email = document.getElementById('authEmail').value.trim();
    authError.style.display = 'none';
    if(!email){ mostrarErrorAuth('Escribe tu correo arriba primero.'); return; }
    if(!FIREBASE_OK){ mostrarErrorAuth('No se pudo conectar con el servicio de cuentas.'); return; }
    try{
      await firebase.auth().sendPasswordResetEmail(email);
      mostrarErrorAuth('Te enviamos un correo para restablecer tu contraseña.', true);
    }catch(e){
      mostrarErrorAuth(traducirErrorFirebase(e));
    }
  });

  authSinCuentaBtn.addEventListener('click', async ()=>{
    try{ localStorage.setItem('modo_sin_cuenta', 'true'); }catch(e){}
    await continuarDespuesDeAuth();
  });

  const authInvitadoBtn = document.getElementById('authInvitadoBtn');
  authInvitadoBtn.addEventListener('click', async ()=>{
    await iniciarModoInvitado();
  });
  document.getElementById('salirInvitadoBtn').addEventListener('click', salirDeModoInvitado);

  const authGoogleBtn = document.getElementById('authGoogleBtn');
  authGoogleBtn.addEventListener('click', async ()=>{
    authError.style.display = 'none';
    if(!FIREBASE_OK){ mostrarErrorAuth('No se pudo conectar con el servicio de cuentas. Revisa tu conexión.'); return; }
    authGoogleBtn.disabled = true;
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
      // Funciona para iniciar sesión Y para registrarse a la vez — si es la primera
      // vez que esa cuenta de Google entra, Firebase la crea automáticamente.
      // El listener de onAuthStateChanged se encarga de continuar desde aquí.
    }catch(e){
      if(e && (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request')) return; // cerró la ventana a propósito
      mostrarErrorAuth(traducirErrorFirebase(e));
    }finally{
      authGoogleBtn.disabled = false;
    }
  });

  let modoSinCuenta = false;
  try{ modoSinCuenta = localStorage.getItem('modo_sin_cuenta') === 'true'; }catch(e){}

  if(FIREBASE_OK && !modoSinCuenta){
    // Se fuerza explícitamente que la sesión quede guardada en este dispositivo/navegador,
    // para que al cerrar y volver a abrir la app no pida iniciar sesión de nuevo —
    // directamente muestra la pantalla de elegir perfil. Mientras se confirma si hay
    // sesión o no, se queda en la pantalla de carga neutra (nunca se llega a ver el
    // formulario de login de refilón si sí hay una sesión guardada).
    try{ await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL); }catch(e){ console.error('No se pudo fijar la persistencia de sesión:', e); }
    firebase.auth().onAuthStateChanged(async (user)=>{
      document.getElementById('loadingScreen').style.display = 'none';
      if(user){
        FIREBASE_UID = user.uid;
        await cargarDatosDeFirebase();
        await continuarDespuesDeAuth();
      } else {
        document.getElementById('authScreen').style.display = 'flex';
      }
    });
  } else {
    document.getElementById('loadingScreen').style.display = 'none';
    await continuarDespuesDeAuth();
  }

  window.addEventListener('popstate', (e)=>{
    const estado = e.state;
    if(estado && estado.screen === 'app'){
      currentTab = (!MODO_INVITADO && estado.tab !== "Ajustes" && !datosClienteCompletos()) ? "Ajustes" : estado.tab;
      currentYear = estado.year;
      document.getElementById('landingScreen').style.display = 'none';
      document.getElementById('mainWrap').style.display = 'block';
      renderYearTabs(); renderSpecialTabs(); renderTabs(); renderContent();
    } else {
      // Sin estado, o estado de "landing" -> volver a la pantalla principal, sin
      // volver a empujar una entrada nueva al historial (para no crear un bucle).
      document.getElementById('mainWrap').style.display = 'none';
      document.getElementById('drawerOverlay').style.display = 'none';
      document.getElementById('drawerPanel').style.display = 'none';
      document.getElementById('landingScreen').style.display = 'flex';
      mostrarPantallaBienvenida();
    }
  });

  document.getElementById('generarPdfBtn').addEventListener('click', generarReportePDF);
  document.getElementById('menuHamburgerBtn').addEventListener('click', openDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
  document.getElementById('searchIconBtn').addEventListener('click', openSearch);
  document.getElementById('fotoModalCerrarBtn').addEventListener('click', cerrarFotoModal);
  document.getElementById('fotoModalBorrarBtn').addEventListener('click', borrarFotoDelModal);
  document.getElementById('fotoModalOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'fotoModalOverlay') cerrarFotoModal();
  });
  document.getElementById('searchOverlay').addEventListener('click', closeSearch);
  document.getElementById('searchInput').addEventListener('input', (e)=>{
    renderResultadosBusqueda(e.target.value);
  });
  document.getElementById('searchInput').addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(searchResultadosActuales.length){
        searchSelectedIndex = (searchSelectedIndex + 1) % searchResultadosActuales.length;
        marcarSeleccionBusqueda();
      }
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(searchResultadosActuales.length){
        searchSelectedIndex = (searchSelectedIndex - 1 + searchResultadosActuales.length) % searchResultadosActuales.length;
        marcarSeleccionBusqueda();
      }
    } else if(e.key === 'Enter'){
      e.preventDefault();
      if(searchSelectedIndex >= 0 && searchResultadosActuales[searchSelectedIndex]){
        ejecutarResultadoBusqueda(searchResultadosActuales[searchSelectedIndex]);
      }
    } else if(e.key === 'Escape'){
      closeSearch();
    }
  });
  document.getElementById('appTitle').addEventListener('click', ()=>{
    navegarA("Resumen Anual");
  });
  document.getElementById('compartirAppBtn').addEventListener('click', iniciarFlujoCompartir);
  const importarLandingBtn = document.getElementById('importarLandingBtn');
  const importarLandingFile = document.getElementById('importarLandingFile');
  importarLandingBtn.addEventListener('click', ()=> importarLandingFile.click());
  importarLandingFile.addEventListener('change', async (e)=>{
    if(e.target.files.length) await importarDesdeLanding(e.target.files[0]);
    e.target.value = "";
  });
})();
</script>
</body>
</html>
